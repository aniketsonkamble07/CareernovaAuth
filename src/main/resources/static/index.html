<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Auth Service</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 450px;
            width: 100%;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .message {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .login-options {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .login-btn {
            padding: 15px 20px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .google-btn {
            background: #DB4437;
            color: white;
        }

        .github-btn {
            background: #333;
            color: white;
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            color: #999;
            margin: 20px 0;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #ddd;
        }

        .divider span {
            padding: 0 10px;
            font-size: 14px;
        }

        .email-form {
            margin-top: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .email-submit {
            width: 100%;
            padding: 12px;
            background: #4a5568;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }

        .email-submit:hover {
            background: #2d3748;
        }

        .back-btn {
            margin-top: 15px;
            background: none;
            border: none;
            color: #667eea;
            cursor: pointer;
            font-size: 14px;
            text-decoration: underline;
            width: 100%;
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            color: rgba(255,255,255,0.8);
            font-size: 13px;
        }

        .token-info {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            word-break: break-all;
            font-family: monospace;
            font-size: 12px;
            border-left: 4px solid #667eea;
        }

        .token-info strong {
            color: #333;
            display: block;
            margin-bottom: 5px;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <div class="header">
            <h1>🔐 Welcome</h1>
            <p>Sign in to continue to your dashboard</p>
        </div>

        <!-- Message Display -->
        <div th:if="${message}" th:class="${'message ' + messageClass}" th:text="${message}"></div>
        <div th:if="${error}" class="message error" th:text="${error}"></div>

        <!-- Token Display (after successful login) -->
        <div th:if="${token}" class="token-info">
            <strong>✅ Login Successful!</strong>
            <span th:text="${token}"></span>
        </div>

        <!-- Main Login Options -->
        <div id="loginOptions" th:class="${showEmailForm ? 'hidden' : 'login-options'}">
            <!-- Email Option -->
            <button onclick="showEmailLogin()" class="login-btn" style="background: #4a5568; color: white;">
                <span>📧</span> Continue with Email
            </button>

            <div class="divider">
                <span>OR</span>
            </div>

            <!-- OAuth Options -->
            <a href="/oauth2/authorization/google" class="login-btn google-btn">
                <span>G</span> Continue with Google
            </a>

            <a href="/oauth2/authorization/github" class="login-btn github-btn">
                <span>⌨️</span> Continue with GitHub
            </a>
        </div>

        <!-- Email Login Form -->
        <div id="emailForm" th:class="${showEmailForm ? 'email-form' : 'hidden'}">
            <form onsubmit="handleEmailLogin(event)">
                <div class="form-group">
                    <input type="email" id="email" placeholder="Email address" required>
                </div>
                <div class="form-group">
                    <input type="password" id="password" placeholder="Password" required>
                </div>
                <button type="submit" class="email-submit">Sign In</button>
            </form>
            <button onclick="hideEmailLogin()" class="back-btn">← Back to login options</button>
        </div>
    </div>
    <div class="footer">
        Auth Service &copy; <span th:text="${#dates.year(#dates.createNow())}">2026</span>
    </div>
</div>

<script>
    function showEmailLogin() {
        document.getElementById('loginOptions').classList.add('hidden');
        document.getElementById('emailForm').classList.remove('hidden');
    }

    function hideEmailLogin() {
        document.getElementById('loginOptions').classList.remove('hidden');
        document.getElementById('emailForm').classList.add('hidden');
    }

    async function handleEmailLogin(event) {
        event.preventDefault();

        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        try {
            const response = await fetch('/api/auth/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ email, password })
            });

            const data = await response.json();

            if (response.ok) {
                // Redirect to the frontend application with token
                window.location.href = 'http://localhost:3000/auth/callback?token=' + data.access_token;
            } else {
                showMessage(data.message || 'Login failed', 'error');
            }
        } catch (error) {
            showMessage('Network error. Please try again.', 'error');
        }
    }

    function showMessage(text, type) {
        // Remove existing message
        const existingMsg = document.querySelector('.message');
        if (existingMsg) existingMsg.remove();

        // Create new message
        const msgDiv = document.createElement('div');
        msgDiv.className = 'message ' + type;
        msgDiv.textContent = text;

        // Insert after header
        const header = document.querySelector('.header');
        header.insertAdjacentElement('afterend', msgDiv);

        // Auto hide after 5 seconds
        setTimeout(() => {
            msgDiv.remove();
        }, 5000);
    }
</script>
</body>
</html>
